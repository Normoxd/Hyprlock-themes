# =============================
#  Hyprlock Themes (By Normo!)
#  /// Variant 1 ///
# =============================

# ~~~ Background ~~~

background {
    path = ~/.config/hypr/hyprlock/backgrounds/kaiju.png
    blur_passes = 1
}

# ~~~ General Settings ~~~

general {
    ignore_empty_input = true
    hide_cursor = true
}

# ~~~ Animations ~~~

animations {
    animation = fade,    1, 6, default
    animation = fadeIn,  1, 6, default
    animation = fadeOut, 1, 6, default
}

# ~~~ Clock & Date ~~~

# Time
label {
    text = $TIME
    color = rgba(216, 222, 233, 0.85)
    font_size = 65
    font_family = Londrina Outline
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.5)
    font_size = 10
    font_family = Product Sans
    position = 0, 135
    halign = center
    valign = center
}

# ~~~ Password Input Field ~~~

input-field {
    size = 100, 50
    outline_thickness = 2
    dots_size = 0.1
    dots_spacing = 0.8
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    font_family = Google Sans
    placeholder_text = <span foreground="##ffffff99"></span>
    hide_input = false
    position = 0, -153
    halign = center
    valign = center
}

# ~~~ Username ~~~

label {
    text = <span>   $USER</span>
    color = rgba(216, 222, 233, 0.73)
    font_size = 8
    font_family = Product Sans
    position = 20, 15
    halign = left
    valign = bottom
}

# ~~~ Date ~~~
label {
    text = <span>   Locked</span>
    color = rgba(216, 222, 233, 0.73)
    font_size = 8
    font_family = Product Sans
    position = 0, 15
    halign = center
    valign = bottom
}

# ~~~ Battery Capacity ~~~
label {
    text = cmd[update:1000] echo "󰁹   $(cat /sys/class/power_supply/BAT1/capacity)%"
    color = rgba(216, 222, 233, 0.73)
    font_size = 8
    font_family = Product Sans
    position = -20, 15
    halign = right
    valign = bottom
}
